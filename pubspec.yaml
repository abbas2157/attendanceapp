name: bams_app
description: "Face Recognition Attendance Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ───────────────────────────
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # ── Networking ─────────────────────────────────
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # ── Camera & ML Kit ────────────────────────────
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  image_picker: ^1.1.2

  # ── TFLite ─────────────────────────────────────

  # ── Location & Permissions ─────────────────────
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.1

  # ── UI / Utilities ────────────────────────────
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  lottie: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  fluttertoast: ^9.0.0
  flutter_secure_storage: ^9.2.4
  device_info_plus: ^12.2.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  image: ^4.5.4
  flutter_image_compress: ^2.4.0
  flutter_exif_rotation: ^0.5.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code Generation for Riverpod ─────────────
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
